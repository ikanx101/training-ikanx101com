{% extends "base.html" %}
{% block title %}Daftar — Study Data{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white rounded-2xl shadow-sm p-8">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3">
        <i class="fas fa-user-plus text-green-600 text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Buat Akun Baru</h1>
      <p class="text-gray-500 text-sm mt-1">Daftar gratis dan mulai belajar</p>
    </div>
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
      <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
    </div>
    {% endif %}
    <form method="post" action="/auth/register" class="space-y-4">
      <div class="grid grid-cols-1 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap *</label>
          <input type="text" name="full_name" required placeholder="Nama kamu"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
          <input type="email" name="email" required placeholder="email@contoh.com"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password *</label>
          <input type="password" name="password" required placeholder="Min. 6 karakter"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Bio (opsional)</label>
          <textarea name="bio" rows="2" placeholder="Ceritakan sedikit tentang kamu..."
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
        </div>
        <div class="bg-blue-50 rounded-lg p-4 space-y-3">
          <h3 class="text-sm font-semibold text-blue-800"><i class="fas fa-shield-alt mr-2"></i>Pertanyaan Keamanan</h3>
          <p class="text-xs text-blue-600">Digunakan untuk reset password jika lupa.</p>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Pertanyaan *</label>
            <select name="security_question" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
              <option value="">-- Pilih pertanyaan --</option>
              {% for q in questions %}
              <option value="{{ q }}">{{ q }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Jawaban *</label>
            <input type="text" name="security_answer" required placeholder="Jawaban kamu"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
          </div>
        </div>
      </div>
      <button type="submit" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold hover:bg-green-700 transition">
        <i class="fas fa-user-plus mr-2"></i>Daftar Sekarang
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">
      Sudah punya akun? <a href="/auth/login" class="text-blue-600 font-medium hover:underline">Masuk</a>
    </p>
  </div>
</div>
{% endblock %}
